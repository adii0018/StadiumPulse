version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stadiumpulse-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DEMO_ADMIN_EMAIL=${DEMO_ADMIN_EMAIL}
      - DEMO_ADMIN_PASSWORD=${DEMO_ADMIN_PASSWORD}
    volumes:
      - sqlite_data:/app/data
    networks:
      - stadiumpulse-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stadiumpulse-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - stadiumpulse-net
    restart: unless-stopped

volumes:
  sqlite_data:

networks:
  stadiumpulse-net:
    driver: bridge
